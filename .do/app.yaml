name: bmw-scrapers

# ── Shared DB env vars — inherited by all 8 scraper workers ──────────────────
envs:
  - key: DO_DB_HOST
    scope: RUN_TIME
    value: db-postgresql-fra1-49814-do-user-35023198-0.m.db.ondigitalocean.com
  - key: DO_DB_PORT
    scope: RUN_TIME
    value: "25060"
  - key: DO_DB_NAME
    scope: RUN_TIME
    value: defaultdb
  - key: DO_DB_USER
    scope: RUN_TIME
    value: doadmin
  - key: DO_DB_SSLMODE
    scope: RUN_TIME
    value: require
  - key: DO_DB_PASSWORD
    scope: RUN_TIME
    type: SECRET
    value: PASTE_DB_PASSWORD_HERE

# ── 8 scraper workers — each runs the same Dockerfile, different SCRAPER_ID ──
workers:
  - name: scraper-1
    github:
      repo: yousseefbertela/scraper-final-16-3-2026
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: SCRAPER_ID
        scope: RUN_TIME
        value: "1"

  - name: scraper-2
